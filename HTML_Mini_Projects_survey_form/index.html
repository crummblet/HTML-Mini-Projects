<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Mini Projects Survey Form</title>
  </head>

  <body>
    <h1 id="title">HTML Mini Projects Survey Form</h1>
    <p id="description">
      Thank you for taking the time to help me improve the HTML Mini Projects
      collection.
    </p>
    <form id="survey-form">
      <label id="name-label">*Full Name:</label>
      <input required type="text" id="name" placeholder="ex. John Doe" />
      <br />

      <label id="email-label">*Email:</label>
      <input
        required
        id="email"
        type="email"
        placeholder="ex. fake@email.com"
      />
      <br />

      <label id="number-label">Age:</label>
      <input id="number" type="number" min="1" max="3" placeholder="ex. 30" />
      <br />
      <br />

      <label for="dropdown"
        >What option best describes your current experience with HTML and
        programming in general?</label
      >
      <br />
      <br />
      <select id="dropdown" required>
        <option value="Inexperienced">Inexperienced</option>
        <option value="Learning">Learning</option>
        <option value="Part time programming job">
          Part time programming job
        </option>
        <option value="Full time programming job" selected>
          Full time programming job
        </option>
      </select>
      <br />
      <br />

      <label
        >Would you return to the HTML Mini Projects site to check for new
        projects?</label
      >
      <br />
      <br />

      <input type="radio" value="definitely" name="choice" />
      <label>Definitely</label>

      <input type="radio" value="maybe" name="choice" />
      <label>Maybe</label>
      <input type="radio" value="not sure" name="choice" />
      <label>Not sure</label>

      <br />
      <br />
      <label
        >What are your favorite part(s) of HTML Mini Projects? (Check all that
        apply)</label
      >
      <br />
      <br />
      <input type="checkbox" value="projects" name="projects" />
      <label>Projects</label>
      <input type="checkbox" value="authenticity" name="authenticity" />
      <label>Authenticity</label>
      <input
        type="checkbox"
        value="Looking for and fixing bugs"
        name="Looking for and fixing bugs"
      />
      <label>Looking for and fixing bugs</label>
      <br />
      <br />
      <label>Any comments or suggestions?</label>
      <br />
      <br />
      <textarea placeholder="Enter your comment here..."></textarea>
      <br />
      <br />
      <input id="submit" type="submit" />
    </form>
  </body>
</html>
